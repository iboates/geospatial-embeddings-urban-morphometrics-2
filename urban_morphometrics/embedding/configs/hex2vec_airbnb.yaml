# Experiment: Hex2Vec embedder on the AirBnB multicity dataset
# Inherits defaults from configs/base.yaml — only overrides are listed here.

experiment_name: "hex2vec_airbnb_r9"

dataset:
  name: "AirbnbMulticity"
  version: "9"
  use_numerical_columns: false
  aggregation: "average"
  dev_size: 0.1

embedder:
  name: "Hex2Vec"
  hidden_sizes: [150, 75, 50]
  fit_kwargs:
    batch_size: 256
    trainer_kwargs:
      max_epochs: 10

model:
  linear_sizes: [50, 100, 50]

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 5
  loss: "SmoothL1"